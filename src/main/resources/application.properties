spring.application.name=food-store-api
spring.datasource.url=jdbc:h2:mem:foodstoredb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.prog3=DEBUG
logging.level.org.springframework.web=WARN

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

seed.admin.email=${SEED_ADMIN_EMAIL:admin@foodstore.com}
seed.admin.password=${SEED_ADMIN_PASSWORD:admin1234}